name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-dummy-secret-32-chars-minimum!!' }}
      AUTH_GOOGLE_ID: ci-google-id
      AUTH_GOOGLE_SECRET: ci-google-secret
      ADMIN_EMAILS: ci@example.com
      RESEND_API_KEY: re_ci_dummy
      CONTACT_TO_EMAIL: ci@example.com
      CONTACT_FROM_EMAIL: CI <ci@example.com>
      LEGAL_NAME: CI
      LEGAL_STREET: CI
      LEGAL_POSTAL_CODE: "00000"
      LEGAL_CITY: CI
      LEGAL_COUNTRY: CI
      LEGAL_EMAIL: ci@example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm run security:audit:prod

      - name: Run quality checks
        run: npm run ci:check
